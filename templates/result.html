{% extends "base.html" %}
{% block content %}
  <h1>Detected plate: {{ plate }}</h1>

  {% if banned %}
    <p class="banned">This vehicle is BANNED.</p>
    <a href="{{ url_for('details', plate=plate) }}">View details</a>
    <form method="post" action="{{ url_for('unban', plate=plate) }}" style="display:inline">
      <input type="hidden" name="plate" value="{{ plate }}">
      <button type="submit">Unban</button>
    </form>
  {% else %}
    <p class="ok">This vehicle is not banned.</p>
    <a href="{{ url_for('ban', plate=plate) }}">Ban this vehicle</a>
  {% endif %}
{% endblock %}
